# This is a composite to allow sharing these steps into other workflows.
# It isn't a shared workflow, because then it isn't convenient to add
# additional workflow specific steps. This workflow is used for both CI and release process.
name: Shared CI Workflow

inputs:
  github_token:
    description: 'Github token used to access contract test harness.'
    required: true
  flutter_version:
    description: 'The Flutter version to install'
    required: false
    default: '3.29.3'
  dart_version:
    description: 'The Dart version to install'
    required: false
    default: '3.7.2'

description: Shared build and test for CI and release.
runs:
  using: composite
  steps:
    - name: Install Dart
      uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1
      with:
        sdk: ${{ inputs.dart_version }}

    - name: Install Flutter
      uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
      with:
        flutter-version: ${{ inputs.flutter_version }}
        channel: 'stable'

    - name: Install Melos
      shell: bash
      run: |
        dart pub global activate melos
        echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      shell: bash
      run: melos bs

    - name: Lint
      shell: bash
      run: melos run analyze

    - name: Style
      shell: bash
      # This will have a non-zero exit code if any files changed.
      run: dart format --output=none --set-exit-if-changed .

    - name: Test
      shell: bash
      run: melos run test

    - name: Platform Canonicalization Tests (Chrome)
      shell: bash
      # Run RFC 8785 canonicalization tests on Chrome to verify platform-independent behavior.
      # These tests ensure that the canonicalization produces identical output on both
      # Dart VM (tested above via melos run test) and Dart2JS/JavaScript (tested here).
      run: |
        cd packages/common
        dart test test/serialization/canonicalize_json_platform_test.dart -p chrome --test-randomize-ordering-seed=random

    - name: Contract Tests
      shell: bash
      run: |
        pushd apps/flutter_client_contract_test_service
        flutter test bin/contract_test_service.dart > test-service.log 2>&1 & disown
    - uses: launchdarkly/gh-actions/actions/contract-tests@contract-tests-v1.3.0
      with:
        test_service_port: 8080
        token: ${{ inputs.github_token }}
        enable_persistence_tests: false
        extra_params: '-status-timeout 100 --skip-from=./apps/flutter_client_contract_test_service/testharness-suppressions.txt'

    - name: SSE Contract Tests Service
      shell: bash
      run: |
        pushd apps/sse_contract_test_service
        dart run bin/sse_contract_test_service.dart > test-service.log 2>&1 & disown
    - uses: launchdarkly/gh-actions/actions/contract-tests@contract-tests-v1.3.0
      with:
        repo: 'sse-contract-tests'
        branch: 'v2.0.0'
        version: 'v2'
        test_service_port: 8080
        debug_logging: true
        enable_persistence_tests: false
        token: ${{ inputs.github_token }}

    - name: Upload Test Service Logs
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      if: always()
      with:
        name: test-service-${{ inputs.flutter_version }}-${{ inputs.dart_version }}.log
        path: apps/sse_contract_test_service/test-service.log

    - name: Build Docs
      shell: bash
      # Just document the end SDK package for now.
      run: melos exec --scope launchdarkly_flutter_client_sdk dart doc
